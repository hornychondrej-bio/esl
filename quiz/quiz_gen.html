<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz Generator</title>
    <!-- Link to external CSS -->
    <link rel="stylesheet" href="style.css">
    
    <!-- React and ReactDOM from CDN -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <!-- Babel for JSX transformation -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <style>
        /* Modern CSS implementation replacing Tailwind utility classes */
        :root {
            /* Fallback variables in case style.css is missing */
            --bg: #0f172a;
            --card-bg: #1e293b;
            --text-main: #f1f5f9;
            --text-muted: #94a3b8;
            --accent: #8b5cf6;
            --border: #334155;
            --glow: 0 0 15px rgba(139, 92, 246, 0.3);
        }

        body {
            background-color: var(--bg);
            color: var(--text-main);
            margin: 0;
            display: flex;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
        }

        .app-container {
            width: 100%;
            max-width: 600px;
            margin-top: 40px;
        }

        .header {
            text-align: center;
            margin-bottom: 40px;
        }

        .gradient-text {
            font-size: 2.5rem;
            font-weight: 800;
            background: linear-gradient(to right, #8b5cf6, #3b82f6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin: 0 0 8px 0;
        }

        .neon-card {
            background: var(--card-bg);
            border: 1px solid var(--border);
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            border-radius: 16px;
            padding: 30px;
            position: relative;
            overflow: hidden;
        }

        .progress-container {
            width: 100%;
            background: var(--border);
            height: 6px;
            border-radius: 10px;
            margin-bottom: 30px;
        }

        .progress-bar {
            background: var(--accent);
            height: 100%;
            border-radius: 10px;
            box-shadow: var(--glow);
            transition: width 0.4s ease;
        }

        .option-btn {
            width: 100%;
            text-align: left;
            padding: 16px;
            margin-bottom: 12px;
            border-radius: 12px;
            border: 2px solid var(--border);
            background: transparent;
            color: var(--text-main);
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: all 0.2s ease;
        }

        .option-btn:hover:not(:disabled) {
            border-color: var(--accent);
            background: rgba(139, 92, 246, 0.05);
        }

        .option-correct { border-color: #10b981; background: rgba(16, 185, 129, 0.1); color: #34d399; }
        .option-wrong { border-color: #ef4444; background: rgba(239, 68, 68, 0.1); color: #f87171; }
        .option-muted { opacity: 0.5; border-color: var(--border); }

        .explanation-box {
            margin-top: 24px;
            padding: 20px;
            background: rgba(15, 23, 42, 0.5);
            border: 1px solid var(--border);
            border-radius: 12px;
        }

        .main-action-btn {
            background: linear-gradient(135deg, var(--accent), #6366f1);
            color: white;
            border: none;
            padding: 14px 28px;
            font-size: 1.1rem;
            font-weight: 700;
            border-radius: 12px;
            cursor: pointer;
            box-shadow: var(--glow);
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .main-action-btn:disabled {
            opacity: 0.3;
            cursor: not-allowed;
            box-shadow: none;
        }

        .animate-in { 
            animation: fadeIn 0.4s ease-out forwards; 
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .results-grid {
            display: flex;
            flex-direction: column;
            gap: 16px;
            max-height: 400px;
            overflow-y: auto;
            padding-right: 8px;
        }

        .results-grid::-webkit-scrollbar { width: 6px; }
        .results-grid::-webkit-scrollbar-thumb { background: var(--border); border-radius: 10px; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;
        
        const Icon = ({ name, size = 20, className = "" }) => {
            const icons = {
                ChevronRight: <path d="m9 18 6-6-6-6"/>,
                Trophy: <path d="M6 9H4.5a2.5 2.5 0 0 1 0-5H6M18 9h1.5a2.5 2.5 0 0 0 0-5H18M4 22h16M10 14.66V17c0 .55-.47.98-.97 1.21C7.85 18.75 7 20.24 7 22M14 14.66V17c0 .55.47.98.97 1.21C16.15 18.75 17 20.24 17 22M9 2h6v7a3 3 0 0 1-6 0V2Z"/>,
                RefreshCcw: <path d="M21 12a9 9 0 0 0-9-9 9.75 9.75 0 0 0-6.74 2.74L3 8m0 0V3m0 5h5M3 12a9 9 0 0 0 9 9 9.75 9.75 0 0 0 6.74-2.74L21 16m0 0v5m0-5h-5"/>,
                Check: <path d="M20 6 9 17l-5-5"/>,
                X: <path d="M18 6 6 18M6 6l12 12"/>,
                Info: <><circle cx="12" cy="12" r="10"/><path d="M12 16v-4"/><path d="M12 8h.01"/></>
            };

            return (
                <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
                    {icons[name] || null}
                </svg>
            );
        };

        const DEFAULT_QUIZ = [
            { id: 1, question: "Which organelle is often referred to as the 'Powerhouse' of the cell?", options: ["Nucleus", "Ribosome", "Mitochondria", "Golgi Apparatus"], answer: "Mitochondria", explanation: "Mitochondria generate most of the cell's supply of ATP." },
            { id: 2, question: "What is the process by which plants convert sunlight into chemical energy?", options: ["Respiration", "Photosynthesis", "Fermentation", "Transpiration"], answer: "Photosynthesis", explanation: "Photosynthesis occurs in chloroplasts using sunlight, water, and CO2." },
            { id: 3, question: "Which molecule carries genetic information in most living organisms?", options: ["RNA", "DNA", "ATP", "Hemoglobin"], answer: "DNA", explanation: "DNA is the hereditary material in almost all organisms." }
        ];

        function App() {
            const [quizData, setQuizData] = useState([]);
            const [loading, setLoading] = useState(true);
            const [currentStep, setCurrentStep] = useState(0);
            const [userAnswers, setUserAnswers] = useState({});
            const [showResults, setShowResults] = useState(false);
            const [isAnswered, setIsAnswered] = useState(false);

            useEffect(() => {
                const fetchQuiz = async () => {
                    const params = new URLSearchParams(window.location.search);
                    const externalUrl = params.get('quiz');
                    if (!externalUrl) {
                        setQuizData(DEFAULT_QUIZ);
                        setLoading(false);
                        return;
                    }
                    try {
                        const response = await fetch(externalUrl);
                        const data = await response.json();
                        setQuizData(Array.isArray(data) ? data : (data.questions || []));
                    } catch (err) {
                        setQuizData(DEFAULT_QUIZ);
                    } finally {
                        setLoading(false);
                    }
                };
                fetchQuiz();
            }, []);

            const handleAnswerSelect = (option) => {
                if (isAnswered) return;
                setUserAnswers({ ...userAnswers, [currentStep]: option });
                setIsAnswered(true);
            };

            const nextQuestion = () => {
                setIsAnswered(false);
                if (currentStep < quizData.length - 1) {
                    setCurrentStep(currentStep + 1);
                } else {
                    setShowResults(true);
                }
            };

            const calculateScore = () => quizData.reduce((acc, q, idx) => userAnswers[idx] === q.answer ? acc + 1 : acc, 0);

            if (loading) return <div style={{display:'flex', height:'100vh', alignItems:'center', justifyContent:'center'}}>Loading...</div>;

            const q = quizData[currentStep];

            return (
                <div className="app-container">
                    <header className="header">
                        <h1 className="gradient-text">Quiz Generator</h1>
                    </header>

                    {!showResults ? (
                        <div className="neon-card animate-in">
                            <div className="progress-container">
                                <div className="progress-bar" style={{ width: `${((currentStep + 1) / quizData.length) * 100}%` }} />
                            </div>

                            <div style={{marginBottom:'24px'}}>
                                <span style={{fontSize:'12px', color:'var(--accent)', fontWeight:'bold', letterSpacing:'1px'}}>QUESTION {currentStep + 1} OF {quizData.length}</span>
                                <h2 style={{fontSize:'1.5rem', marginTop:'8px'}}>{q.question}</h2>
                            </div>

                            <div className="options-list">
                                {q.options.map((opt, i) => {
                                    let cls = "option-btn";
                                    if (isAnswered) {
                                        if (opt === q.answer) cls += " option-correct";
                                        else if (opt === userAnswers[currentStep]) cls += " option-wrong";
                                        else cls += " option-muted";
                                    }
                                    return (
                                        <button key={i} className={cls} onClick={() => handleAnswerSelect(opt)} disabled={isAnswered}>
                                            {opt}
                                            {isAnswered && opt === q.answer && <Icon name="Check" />}
                                            {isAnswered && opt === userAnswers[currentStep] && opt !== q.answer && <Icon name="X" />}
                                        </button>
                                    );
                                })}
                            </div>

                            {isAnswered && (
                                <div className="explanation-box animate-in">
                                    <div style={{display:'flex', alignItems:'center', gap:'8px', color:'var(--accent)', marginBottom:'8px', fontSize:'12px', fontWeight:'bold'}}>
                                        <Icon name="Info" size={14} /> EXPLANATION
                                    </div>
                                    <p style={{fontSize:'14px', color:'var(--text-muted)', fontStyle:'italic'}}>{q.explanation}</p>
                                </div>
                            )}

                            <div style={{marginTop:'30px', display:'flex', justifyContent:'flex-end'}}>
                                <button className="main-action-btn" onClick={nextQuestion} disabled={!isAnswered}>
                                    {currentStep === quizData.length - 1 ? "Finish" : "Next"} <Icon name="ChevronRight" />
                                </button>
                            </div>
                        </div>
                    ) : (
                        <div className="neon-card animate-in" style={{textAlign:'center'}}>
                            <div style={{margin:'0 auto 20px', width:'60px', height:'60px', background:'rgba(139,92,246,0.2)', borderRadius:'12px', display:'flex', alignItems:'center', justifyContent:'center', color:'var(--accent)'}}>
                                <Icon name="Trophy" size={32} />
                            </div>
                            <h2 style={{fontSize:'2rem', marginBottom:'10px'}}>Quiz Complete!</h2>
                            <p style={{fontSize:'1.2rem', color:'var(--text-muted)', marginBottom:'30px'}}>Score: {calculateScore()} / {quizData.length}</p>
                            
                            <div className="results-grid">
                                {quizData.map((item, idx) => (
                                    <div key={idx} style={{textAlign:'left', padding:'12px', borderBottom:'1px solid var(--border)'}}>
                                        <p style={{fontWeight:'bold', fontSize:'14px'}}>{item.question}</p>
                                        <p style={{fontSize:'12px', color: userAnswers[idx] === item.answer ? '#34d399' : '#f87171'}}>
                                            Your answer: {userAnswers[idx]}
                                        </p>
                                    </div>
                                ))}
                            </div>

                            <button className="main-action-btn" style={{margin:'30px auto 0'}} onClick={() => window.location.reload()}>
                                <Icon name="RefreshCcw" size={18} /> Restart Quiz
                            </button>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>

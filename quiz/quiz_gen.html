<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Midnight Neon Quiz</title>
    <!-- Link to external CSS -->
    <link rel="stylesheet" href="style.css">
    
    <!-- React and ReactDOM from CDN -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <!-- Babel for JSX transformation -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <style>
        /* Utility classes that rely on external variables or custom animations */
        .gradient-text {
            background: linear-gradient(to right, #8b5cf6, #3b82f6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .neon-card {
            background: var(--card-bg);
            border: 1px solid var(--border);
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            border-radius: 16px;
        }

        .progress-bar-bg {
            background: var(--border);
        }

        .animate-in { 
            animation: fadeIn 0.4s ease-out forwards; 
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Custom Scrollbar for review list */
        .custom-scroll::-webkit-scrollbar {
            width: 6px;
        }
        .custom-scroll::-webkit-scrollbar-track {
            background: var(--bg);
        }
        .custom-scroll::-webkit-scrollbar-thumb {
            background: var(--border);
            border-radius: 10px;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;
        
        const Icon = ({ name, size = 24, className = "" }) => {
            const icons = {
                ChevronRight: <path d="m9 18 6-6-6-6"/>,
                Trophy: <path d="M6 9H4.5a2.5 2.5 0 0 1 0-5H6M18 9h1.5a2.5 2.5 0 0 0 0-5H18M4 22h16M10 14.66V17c0 .55-.47.98-.97 1.21C7.85 18.75 7 20.24 7 22M14 14.66V17c0 .55.47.98.97 1.21C16.15 18.75 17 20.24 17 22M9 2h6v7a3 3 0 0 1-6 0V2Z"/>,
                RefreshCcw: <path d="M21 12a9 9 0 0 0-9-9 9.75 9.75 0 0 0-6.74 2.74L3 8m0 0V3m0 5h5M3 12a9 9 0 0 0 9 9 9.75 9.75 0 0 0 6.74-2.74L21 16m0 0v5m0-5h-5"/>,
                CheckCircle2: (
                    <React.Fragment>
                        <circle cx="12" cy="12" r="10"/><path d="m9 12 2 2 4-4"/>
                    </React.Fragment>
                ),
                XCircle: (
                    <React.Fragment>
                        <circle cx="12" cy="12" r="10"/><path d="m15 9-6 6m0-6 6 6"/>
                    </React.Fragment>
                ),
                Check: <path d="M20 6 9 17l-5-5"/>,
                X: <path d="M18 6 6 18M6 6l12 12"/>,
                Info: (
                    <React.Fragment>
                        <circle cx="12" cy="12" r="10"/><path d="M12 16v-4"/><path d="M12 8h.01"/>
                    </React.Fragment>
                )
            };

            return (
                <svg 
                    xmlns="http://www.w3.org/2000/svg" 
                    width={size} 
                    height={size} 
                    viewBox="0 0 24 24" 
                    fill="none" 
                    stroke="currentColor" 
                    strokeWidth="2" 
                    strokeLinecap="round" 
                    strokeLinejoin="round" 
                    className={className}
                >
                    {icons[name] || null}
                </svg>
            );
        };

        const DEFAULT_QUIZ = [
            {
                id: 1,
                question: "Which organelle is often referred to as the 'Powerhouse' of the cell?",
                options: ["Nucleus", "Ribosome", "Mitochondria", "Golgi Apparatus"],
                answer: "Mitochondria",
                explanation: "Mitochondria generate most of the cell's supply of adenosine triphosphate (ATP), used as a source of chemical energy."
            },
            {
                id: 2,
                question: "What is the process by which plants convert sunlight into chemical energy?",
                options: ["Respiration", "Photosynthesis", "Fermentation", "Transpiration"],
                answer: "Photosynthesis",
                explanation: "Photosynthesis occurs in the chloroplasts and uses sunlight, water, and CO2 to create glucose."
            },
            {
                id: 3,
                question: "Which molecule carries genetic information in most living organisms?",
                options: ["RNA", "DNA", "ATP", "Hemoglobin"],
                answer: "DNA",
                explanation: "Deoxyribonucleic acid (DNA) is the hereditary material in humans and almost all other organisms."
            }
        ];

        function App() {
            const [quizData, setQuizData] = useState([]);
            const [loading, setLoading] = useState(true);
            const [error, setError] = useState(null);
            const [currentStep, setCurrentStep] = useState(0);
            const [userAnswers, setUserAnswers] = useState({});
            const [showResults, setShowResults] = useState(false);
            const [isAnswered, setIsAnswered] = useState(false);

            useEffect(() => {
                const fetchQuiz = async () => {
                    const params = new URLSearchParams(window.location.search);
                    const externalUrl = params.get('quiz') || params.get('link_to_json_file');
                    if (!externalUrl) {
                        setQuizData(DEFAULT_QUIZ);
                        setLoading(false);
                        return;
                    }
                    try {
                        const response = await fetch(externalUrl);
                        if (!response.ok) throw new Error(`HTTP error! status: ${response.status}`);
                        const data = await response.json();
                        let questions = Array.isArray(data) ? data : (data.questions || []);
                        if (questions.length === 0) throw new Error("No questions found in JSON.");
                        setQuizData(questions);
                    } catch (err) {
                        setError(`Failed to load external quiz. Using fallback instead.`);
                        setQuizData(DEFAULT_QUIZ);
                    } finally {
                        setLoading(false);
                    }
                };
                fetchQuiz();
            }, []);

            const handleAnswerSelect = (option) => {
                if (isAnswered) return;
                setUserAnswers({ ...userAnswers, [currentStep]: option });
                setIsAnswered(true);
            };

            const nextQuestion = () => {
                setIsAnswered(false);
                if (currentStep < quizData.length - 1) {
                    setCurrentStep(currentStep + 1);
                } else {
                    setShowResults(true);
                }
            };

            const resetQuiz = () => {
                setCurrentStep(0);
                setUserAnswers({});
                setShowResults(false);
                setIsAnswered(false);
            };

            const calculateScore = () => quizData.reduce((acc, q, idx) => userAnswers[idx] === q.answer ? acc + 1 : acc, 0);

            if (loading) return (
                <div className="min-h-screen flex items-center justify-center">
                    <div className="animate-spin rounded-full h-12 w-12 border-b-2 border-violet-500"></div>
                </div>
            );

            const currentQuestionData = quizData[currentStep];
            const selectedAnswer = userAnswers[currentStep];

            return (
                <div className="min-h-screen py-12 px-4 flex justify-center items-start">
                    <div className="w-full max-w-xl">
                        <header className="mb-10 text-center">
                            <h1 className="text-4xl font-extrabold gradient-text mb-2">Quiz Generator</h1>
                            <p className="text-slate-400 font-medium">
                                {error ? error : "Powered by Midnight Neon Engine"}
                            </p>
                        </header>

                        {!showResults ? (
                            <div className="neon-card p-6 md:p-8 animate-in">
                                {/* Progress */}
                                <div className="w-full progress-bar-bg h-1.5 rounded-full mb-8">
                                    <div 
                                        className="bg-violet-500 h-1.5 rounded-full transition-all duration-500 shadow-[0_0_10px_rgba(139,92,246,0.5)]" 
                                        style={{ width: `${((currentStep + 1) / quizData.length) * 100}%` }} 
                                    />
                                </div>

                                <div className="mb-8">
                                    <span className="text-[10px] font-bold uppercase tracking-[0.2em] text-violet-400">
                                        Question {currentStep + 1} of {quizData.length}
                                    </span>
                                    <h2 className="text-2xl font-bold mt-2 leading-tight text-slate-100">
                                        {currentQuestionData.question}
                                    </h2>
                                </div>

                                <div className="space-y-3">
                                    {currentQuestionData.options.map((option, idx) => {
                                        let borderClass = "border-[#334155]";
                                        let bgClass = "bg-[#1e293b]";
                                        let textClass = "text-slate-200";
                                        let icon = null;

                                        if (isAnswered) {
                                            if (option === currentQuestionData.answer) {
                                                borderClass = "border-emerald-500";
                                                bgClass = "bg-emerald-500/10";
                                                textClass = "text-emerald-400";
                                                icon = <Icon name="Check" size={18} className="text-emerald-400" />;
                                            } else if (option === selectedAnswer) {
                                                borderClass = "border-rose-500";
                                                bgClass = "bg-rose-500/10";
                                                textClass = "text-rose-400";
                                                icon = <Icon name="X" size={18} className="text-rose-400" />;
                                            } else {
                                                textClass = "text-slate-500";
                                                bgClass = "bg-transparent";
                                                borderClass = "border-slate-800";
                                            }
                                        } else if (selectedAnswer === option) {
                                            borderClass = "border-violet-500";
                                            bgClass = "bg-violet-500/10";
                                        }

                                        return (
                                            <button 
                                                key={idx} 
                                                onClick={() => handleAnswerSelect(option)}
                                                disabled={isAnswered}
                                                className={`w-full text-left p-4 rounded-xl border-2 transition-all flex justify-between items-center menu-btn ${borderClass} ${bgClass} ${textClass}`}
                                            >
                                                <span className="font-semibold">{option}</span>
                                                {icon}
                                            </button>
                                        );
                                    })}
                                </div>

                                {isAnswered && (
                                    <div className="mt-8 p-5 bg-slate-900/50 border border-slate-700 rounded-xl animate-in">
                                        <p className="text-xs font-black uppercase tracking-widest text-violet-400 mb-2 flex items-center gap-2">
                                            <Icon name="Info" size={14} /> Explanation
                                        </p>
                                        <p className="text-sm text-slate-300 leading-relaxed italic">
                                            {currentQuestionData.explanation || "No explanation provided."}
                                        </p>
                                    </div>
                                )}

                                <div className="mt-10 flex justify-end">
                                    <button 
                                        onClick={nextQuestion} 
                                        disabled={!isAnswered}
                                        className={`flex items-center gap-2 px-10 py-4 rounded-xl font-bold main-action-btn ${!isAnswered ? 'opacity-30 cursor-not-allowed grayscale' : ''}`}
                                    >
                                        {currentStep === quizData.length - 1 ? "Finish Quiz" : "Next Step"} 
                                        <Icon name="ChevronRight" size={20} />
                                    </button>
                                </div>
                            </div>
                        ) : (
                            <div className="space-y-6 animate-in">
                                <div className="neon-card p-10 text-center relative overflow-hidden">
                                    <div className="absolute top-0 left-0 w-full h-full bg-radial-gradient(circle, rgba(139,92,246,0.1) 0%, transparent 70%) pointer-events-none" />
                                    
                                    <div className="inline-flex items-center justify-center w-20 h-20 rounded-2xl bg-violet-500/20 text-violet-400 mb-6 border border-violet-500/30">
                                        <Icon name="Trophy" size={40} />
                                    </div>
                                    <h2 className="text-4xl font-black mb-2 text-slate-100">Complete!</h2>
                                    <p className="text-slate-400 text-lg mb-8">
                                        You scored <span className="text-violet-400 font-bold">{calculateScore()}</span> out of {quizData.length}
                                    </p>
                                    
                                    <button 
                                        onClick={resetQuiz} 
                                        className="inline-flex items-center gap-2 px-8 py-3 bg-slate-100 text-slate-900 rounded-xl font-bold hover:bg-white transition-all transform hover:-translate-y-1 active:scale-95"
                                    >
                                        <Icon name="RefreshCcw" size={18} /> Try Again
                                    </button>
                                </div>

                                <div className="space-y-4">
                                    <h3 className="text-sm font-black uppercase tracking-[0.3em] text-slate-500 px-2">Review</h3>
                                    <div className="space-y-3 custom-scroll max-h-[400px] overflow-y-auto pr-2">
                                        {quizData.map((q, idx) => {
                                            const isCorrect = userAnswers[idx] === q.answer;
                                            return (
                                                <div key={idx} className={`neon-card p-5 border-l-4 ${isCorrect ? 'border-l-emerald-500' : 'border-l-rose-500'}`}>
                                                    <div className="flex items-start gap-4">
                                                        <Icon 
                                                            name={isCorrect ? "CheckCircle2" : "XCircle"} 
                                                            className={isCorrect ? 'text-emerald-500' : 'text-rose-500'} 
                                                            size={24} 
                                                        />
                                                        <div className="flex-1">
                                                            <p className="font-bold text-slate-100 text-lg leading-snug">{q.question}</p>
                                                            <div className="mt-3 flex flex-wrap gap-x-4 gap-y-1">
                                                                <p className={`text-sm ${isCorrect ? 'text-emerald-400' : 'text-rose-400'}`}>
                                                                    Yours: <span className="font-bold">{userAnswers[idx]}</span>
                                                                </p>
                                                                {!isCorrect && (
                                                                    <p className="text-sm text-emerald-400">
                                                                        Correct: <span className="font-bold">{q.answer}</span>
                                                                    </p>
                                                                )}
                                                            </div>
                                                        </div>
                                                    </div>
                                                </div>
                                            );
                                        })}
                                    </div>
                                </div>
                            </div>
                        )}
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
